{% extends "main.html" %}

{% block tabs %}
  {{ super() }}

  <style>
    .md-header {
      position: initial;
    }
    .md-main__inner {
      margin: 0;
    }
    .md-content {
      display: none;
    }
    @media screen and (min-width: 60em) {
      .md-sidebar--secondary { display: none; }
    }
    @media screen and (min-width: 76.25em) {
      .md-sidebar--primary { display: none; }
    }
  </style>

  <section class="mdx-container">
    <div class="mdx-hero">
      <div class="mdx-hero__image">
        <img src="{{ 'assets/hero/space-hero.jpg' | url }}" alt="" draggable="false" />
      </div>
      <div class="mdx-hero__content md-grid md-typeset">
        <h1>allenge 的小站</h1>
        <p>探索宇宙，记录思考</p>
        <a href="{{ 'blog/' | url }}" class="md-button md-button--primary">博客</a>
        <a href="{{ 'cs/' | url }}" class="md-button">笔记</a>
      </div>
    </div>
  </section>

{% endblock %}

{% block content %}{% endblock %}
{% block footer %}{{ super() }}{% endblock %}
